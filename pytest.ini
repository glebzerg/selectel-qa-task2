[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html
markers =
    smoke: быстрые smoke-тесты (запускать при каждом деплое)
    regression: полный регрессионный набор
    ui: UI-тесты через Playwright
    api: тесты через HTTP-запросы
    accessibility: тесты доступности
    mobile: тесты мобильного отображения
    negative: негативные сценарии
